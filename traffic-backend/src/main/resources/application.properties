spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/traffic_db?useSSL=true&requireSSL=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=update
# H2 Console is no longer relevant for MySQL, but we keep it false by default just in case
spring.h2.console.enabled=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Load external environment variables natively from .env file
spring.config.import=optional:file:.env[.properties]

# JWT Configuration
jwt.secret=${JWT_SECRET_KEY:poojanSecretKey_TrafficViolationManagementSystem_LongStringForSecurity}

# Spring AI Gemini Configuration
spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-2.5-flash